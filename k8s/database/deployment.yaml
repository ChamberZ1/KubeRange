# deploys a PostgreSQL database used as the backend for the KubeRange application
apiVersion: apps/v1  # specifies the API version for the Deployment resource
kind: Deployment  # specifies type of resource
metadata:
  name: postgres  # name of the deployment
spec:
  replicas: 1  # number of copies of the pod to run
  selector:
    matchLabels:
      app: postgres  # label selector to identify the pods managed by this deployment
  template:
    metadata:
      labels:
        app: postgres  # labels pods so the selector above can find them
    spec:  # container specification for the pod
      containers:
      - name: postgres
        image: postgres:15  # official PostgreSQL Docker image, version 15
        env:
        - name: POSTGRES_DB
          value: kuberange  # name of the database to create on startup
        - name: POSTGRES_USER
          value: kuberange_user  # database user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret  # references the Secret defined in secret.yaml
              key: password  # key within the secret to retrieve the value from
        ports:
        - containerPort: 5432  # default PostgreSQL port exposed by the container
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data  # path inside the container where PostgreSQL stores its data
        - name: init-scripts
          mountPath: /docker-entrypoint-initdb.d  # path where PostgreSQL looks for initialization scripts to run on first startup
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc  # references the PVC defined in persistent-volume.yaml to persist data across restarts
      - name: init-scripts
        configMap:
          name: postgres-init-config